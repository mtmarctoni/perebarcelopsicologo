name: Sync Env to Vercel

on:
  # Auto-sync on every push to main (Production)
  push:
    branches: [main]
  # Manual sync for any environment
  workflow_dispatch:
    inputs:
      environment:
        description: "GitHub Environment (and Vercel target)"
        required: true
        default: "Production"
        type: choice
        options:
          - Production
          - Preview

jobs:
  sync:
    name: Sync GitHub Secrets → Vercel
    runs-on: ubuntu-latest
    # For auto-run (push to main), hardcode Production. For manual, use input.
    environment: ${{ github.event_name == 'push' && 'Production' || github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Determine target environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "target=Production" >> "$GITHUB_OUTPUT"
            echo "prod_flag=--prod" >> "$GITHUB_OUTPUT"
          else
            echo "target=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
            if [ "${{ github.event.inputs.environment }}" = "Production" ]; then
              echo "prod_flag=--prod" >> "$GITHUB_OUTPUT"
            else
              echo "prod_flag=" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Sync environment variables to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          TARGET_ENV: ${{ steps.env.outputs.target }}
        run: |
          set -euo pipefail

          echo "🔗 Logging into Vercel..."
          vercel login --token "$VERCEL_TOKEN" --yes

          # Helper to upsert an env var
          sync_var() {
            local name="$1"
            local value="$2"
            local target="$3"

            if [ -z "$value" ]; then
              echo "⚠️  Skipping $name (empty value)"
              return
            fi

            echo "🔄 Syncing $name → $target"

            # Remove existing var (ignore errors if it doesn't exist)
            vercel env rm "$name" "$target" --yes --token "$VERCEL_TOKEN" 2>/dev/null || true

            # Add new var via stdin
            printf '%s' "$value" | vercel env add "$name" "$target" --token "$VERCEL_TOKEN"
          }

          # Server secrets (read from the current GitHub Environment)
          sync_var "RESEND_API_KEY" "${{ secrets.RESEND_API_KEY }}" "$TARGET_ENV"
          sync_var "GOOGLE_SITE_VERIFICATION" "${{ secrets.GOOGLE_SITE_VERIFICATION }}" "$TARGET_ENV"

          # Client public vars (also needed in the target environment)
          sync_var "NEXT_PUBLIC_CALENDLY_URL" "${{ secrets.NEXT_PUBLIC_CALENDLY_URL }}" "$TARGET_ENV"

          echo ""
          echo "✅ Sync complete!"

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          PROD_FLAG: ${{ steps.env.outputs.prod_flag }}
        run: |
          echo "🚀 Triggering Vercel deployment..."
          vercel deploy --yes --token "$VERCEL_TOKEN" $PROD_FLAG
